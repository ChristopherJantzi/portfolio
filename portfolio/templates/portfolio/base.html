<!DOCTYPE html>
<html lang="en">

<head>

            <h1><a href="/">Chris Jantzi Dot Com</a></h1>

    <main class="container">
        <div class="row">

            </div>

    <footer class="page-footer sample-second-class">
        <p>
            &copy <time datetime="2026">2026</time> Dr. Christopher Jantzi. All rights reserved.
