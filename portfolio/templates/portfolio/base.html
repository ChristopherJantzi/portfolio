{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta property="og:type" content="website">
    <meta property="og:title" content="decoherentdoc.pythonanywhere.com">
    <meta property="og:description" content="Chris Jantzi's (Rather Shoddy) Website">
    <meta property="og:image" content="https://miro.medium.com/v2/resize:fit:3532/format:webp/1*2OKX1nhsZ3-CB2CidEdhJw.png">
    <title>Chris Jantzi Dot Com</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/portfolio.css' %}">
</head>

<body>
    <header class="page-header">
        <div class="container">
            {% if user.is_authenticated %}
                <a href="{% url 'news_new' %}" class="top-menu">
                    {% include './icons/file-earmark-plus.svg' %}
                </a>
            {% endif %}
            <h1><a href="/">Chris Jantzi Dot Com</a></h1>
            <h3><a href="/resume">-Resume-</a></h3>
        </div>
    </header>
    <main class="container">
        <div class="row">
            <div class="col">
                {% block content %}
                {% endblock %}
            </div>
        </div>
    </main>
</body>

</html>
